---
name: Release

on:
  push:
    branches:
      - main

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.changed }}
      new_version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Verifica mudança de versão
        id: check
        run: |
          VERSION_SED='s/.*"\(.*\)"/\1/'
          CURRENT=$(grep -m1 '^version' pyproject.toml \
            | sed "$VERSION_SED")
          git show HEAD~1:pyproject.toml \
            > /tmp/old_pyproject.toml 2>/dev/null || true
          OLD=$(grep -m1 '^version' /tmp/old_pyproject.toml \
            2>/dev/null | sed "$VERSION_SED" || echo "")
          echo "current=$CURRENT old=$OLD"
          if [ "$CURRENT" != "$OLD" ] && [ -n "$CURRENT" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  create-release:
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Cria release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.new_version }}
        run: |
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes
